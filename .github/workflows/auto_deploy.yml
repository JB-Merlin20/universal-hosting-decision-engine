name: Auto Generate & Deploy

on:
  push:
    branches: [ main ]  # triggers on push to main branch

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt || echo "No dependencies"

      - name: Generate claude.md
        run: python scripts/generate_mermaid.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add claude.md
          git add src/
          git add assets/
          git commit -m "Auto-update project + claude.md" || echo "No changes to commit"
          git push