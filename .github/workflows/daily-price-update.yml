name: Daily Price Update

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: # Manual trigger for testing

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install app dependencies
        run: cd app && npm ci

      - name: Run price scraper
        id: scraper
        run: node scripts/price-scraper-agent.js
        continue-on-error: true

      - name: Run data agent
        run: node scripts/data-agent.js

      - name: Run smart features agent
        run: node scripts/smart-features-agent.js

      - name: Run extra features agent
        run: node scripts/extra-features-agent.js

      - name: Check for changes
        id: changes
        run: |
          git add data/scrape-report.json data/hosting.json data/hosting-processed.json data/hosting-export.csv app/src/data/hosting-data.json
          SNAPSHOT=$(ls -1 data/snapshots/snapshot-*.json 2>/dev/null | tail -1)
          if [ -n "$SNAPSHOT" ]; then git add "$SNAPSHOT"; fi
          git diff --staged --quiet 2>/dev/null \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "price-bot[bot]"
          git config user.email "price-bot[bot]@users.noreply.github.com"
          git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
          git push

      - name: Post summary
        if: always()
        run: |
          if [ -f data/scrape-report.json ]; then
            node -e "
              const r = require('./data/scrape-report.json');
              const s = r.summary || {};
              console.log('## Daily Price Update Summary');
              console.log('');
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Updated | ' + (s.updated || 0) + ' |');
              console.log('| Unchanged | ' + (s.unchanged || 0) + ' |');
              console.log('| Failed | ' + (s.failed || 0) + ' |');
              console.log('| Total | ' + (s.total_providers || 0) + ' |');
              console.log('');
              const failed = (r.providers || []).filter(p => p.status === 'failed');
              if (failed.length > 0) {
                console.log('### Failed Scrapers');
                failed.forEach(p => console.log('- **' + (p.id || p.scraper) + '**: ' + (p.error || 'unknown')));
              }
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No scrape report found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open issue for persistent failures
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('data/scrape-report.json')) return;
            const report = JSON.parse(fs.readFileSync('data/scrape-report.json', 'utf8'));
            const persistent = (report.providers || [])
              .filter(p => p.status === 'failed' && (p.consecutive_failures || 0) >= 3);

            for (const p of persistent) {
              const title = `Scraper broken: ${p.id || p.scraper} — needs selector update`;
              // Check if issue already exists
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'scraper',
              });
              const exists = issues.some(i => i.title === title);
              if (!exists) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body: `Provider \`${p.id || p.scraper}\` has failed scraping for ${p.consecutive_failures} consecutive days.\n\nLast error: \`${p.error || 'unknown'}\`\n\nSource URL: ${p.source_url || 'N/A'}`,
                  labels: ['scraper', 'automated'],
                });
              }
            }
