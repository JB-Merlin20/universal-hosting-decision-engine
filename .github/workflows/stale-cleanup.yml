name: Stale Cleanup

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  stale-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had activity in 60 days. It will be closed in 14 days if no further activity occurs.

            If this is still relevant, add a comment or remove the `stale` label.
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had activity in 30 days. It will be closed in 14 days if no further activity occurs.

            Please update the branch or add a comment to keep it open.
          close-issue-message: "Closed due to inactivity. Reopen if still needed."
          close-pr-message: "Closed due to inactivity. Reopen if still needed."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,in-progress,bug"
          exempt-pr-labels: "pinned,security,in-progress"
          operations-per-run: 50

  stale-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find stale branches
        id: stale
        run: |
          stale_branches=""
          while IFS= read -r line; do
            branch=$(echo "$line" | awk '{print $1}' | sed 's|origin/||')
            # Skip protected branches
            if [[ "$branch" == "main" || "$branch" == "master" || "$branch" == "HEAD" ]]; then
              continue
            fi
            stale_branches+="- \`$branch\` (last updated: $(echo "$line" | cut -d'(' -f2 | cut -d')' -f1))\n"
          done < <(git for-each-ref --sort=committerdate refs/remotes/origin \
            --format='%(refname:short) (%(committerdate:relative))' | \
            grep -E '([3-9][0-9]|[1-9][0-9]{2,}) days ago|months ago|years ago')

          if [ -z "$stale_branches" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No stale branches found."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo "list<<EOF"
              echo -e "$stale_branches"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create cleanup issue
        if: steps.stale.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Check for existing open cleanup issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'housekeeping',
              state: 'open',
              per_page: 10
            });

            const hasExisting = existing.data.some(i => i.title.includes('Stale Branch Cleanup'));
            if (hasExisting) {
              console.log('Cleanup issue already open, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Stale Branch Cleanup',
              labels: ['housekeeping'],
              body: `## Stale Branches\n\nThe following branches have not been updated in over 30 days:\n\n${process.env.STALE_LIST}\n\nPlease review and delete branches that are no longer needed.\n\n> Auto-generated by the stale cleanup workflow.`
            });
        env:
          STALE_LIST: ${{ steps.stale.outputs.list }}
